trigger:
  batch: true
  branches:
    include:
      - "main"

variables:
- name: BuildPlatform
  value : 'x64'
- name: BuildConfiguration
  value: 'release'
resources:
  repositories:
    - repository: das-payments-v2-collectionperiod
      fetchDepth: 0
      type: github
      name: SkillsFundingAgency/das-payments-v2-collectionperiod
      endpoint: SkillsFundingAgency

stages:
- stage: Build_Unit_Tests
  displayName: 'Build and Unit Tests'
  jobs:
  - template: pipeline-templates/job/code-build.yml
  #- template: pipeline-templates/job/unittests.yml

- stage: Deploy_DST
  displayName: 'Deploy to DST'
  variables:
  - name: tagEnvironment
    value: Dev/Test
  - group: DCOL-DST - Environment Key Vault Secrets
  - group: DCOL-CollectionPeriod-FunctionApp

  jobs:
  - template: pipeline-templates/job/deploy.yml
    parameters:
      pool: DCT
      environmentName: DST
      azureSubscription: DCT-VSO
      appName: DCOL-DST-CollectionPeriod-WEU

- stage: Deploy_DAS
  dependsOn: Deploy_DST
  displayName: Deploy to DAS
  variables:
  - name: tagEnvironment
    value: Dev/Test
  - group: DCOL-DAS - Environment Key Vault Secrets
  - group: DCOL-CollectionPeriod-FunctionApp
  - group : Common - Connection String
  - group : Common - Database Names
  - group : Common - Database Usernames
  - group : Common - Project Level
 
  jobs:
  - template: pipeline-templates/job/deploy.yml
    parameters:
      pool: DCT
      environmentName: DAS
      azureSubscription: DCT-VSO
      appName: DCOL-DAS-CollectionPeriod-WEU

- stage: Deploy_SIT
  dependsOn: Deploy_DAS
  displayName: Deploy to SIT
  variables:
  - name: tagEnvironment
    value: Dev/Test
  - group: DCOL-SIT - Environment Key Vault Secrets
  
  jobs:
  - template: pipeline-templates/job/deploy.yml
    parameters:
      pool: DCT Build Pool
      environmentName: SIT
      azureSubscription: DCT-VSO
      appName: DCOL-SIT-ProviderPaymentsRepublishService

- stage: Deploy_ETE
  dependsOn: Deploy_SIT
  displayName: Deploy to ETE
  variables:
  - name: tagEnvironment
    value: Dev/Test
  - group: DCOL-ETE - Environment Key Vault Secrets
 
  jobs:
  - template: pipeline-templates/job/deploy.yml
    parameters:
      pool: DCT Build Pool
      environmentName: ETE
      azureSubscription: DCT-VSO
      appName: DCOL-ETE-ProviderPaymentsRepublishService

- stage: Deploy_MO
  dependsOn: Deploy_ETE
  displayName: Deploy to MO
  variables:
  - name: tagEnvironment
    value: Dev/Test
  - group: DCOL-MO - Environment Key Vault Secrets
  
  jobs:
  - template: pipeline-templates/job/deploy.yml
    parameters:
      pool: DCT Build Pool
      environmentName: MO
      azureSubscription: DCOL-MO-VSTS
      appName: DCOL-MO-ProviderPaymentsRepublishService

- stage: Deploy_PD
  dependsOn: Deploy_MO
  displayName: Deploy to PD
  variables:
  - name: tagEnvironment
    value: Dev/Test
  - group: DCOL-PD - Environment Key Vault Secrets
  
  jobs:
  - template: pipeline-templates/job/deploy.yml
    parameters:
      pool: DCT Build Pool
      environmentName: PD
      azureSubscription: DCOLPDVSTS
      appName: DCOL-PD-ProviderPaymentsRepublishService





